spring:
  application:
    name: cupons

    # Banco H2 em memória, gerenciado pelo Spring Data JPA
    datasource:
      url: jdbc:h2:mem:cuponsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:

    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: create-drop # cria o schema ao iniciar e descarta ao parar
      show-sql: true # exibe as queries no console
      properties:
        hibernate:
          format_sql: true

    # Console web do H2 - http://localhost:8080/h2-console
    h2:
      console:
        enabled: true
        path: /h2-console

    security:
      ignored: /h2-console/**

# Taxa de serviço configurável (em %) — padrão 0
service:
  feePercent: 0
